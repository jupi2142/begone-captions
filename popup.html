<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    width: 220px;
    padding: 12px;
    margin: 0;
    font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #15202b;
    color: #e7e9ea;
  }
  h1 {
    margin: 0 0 12px;
    font-size: 15px;
    font-weight: 600;
  }
  label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
  input[type="checkbox"] { accent-color: #1d9bf0; }
  .desc { font-size: 11px; color: #71767b; margin: 2px 0 12px 22px; }
  .clicks-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .clicks-row input[type="number"] {
    width: 60px;
    padding: 4px 6px;
    border: 1px solid #38444d;
    border-radius: 4px;
    background: #192734;
    color: #e7e9ea;
    font: 13px sans-serif;
    text-align: center;
  }
  .clicks-row input:disabled { opacity: 0.4; }
  .clicks-hint { font-size: 11px; color: #71767b; margin: 4px 0 0 0; }
</style>
</head>
<body>
  <h1>Begone Captions</h1>

  <label>
    <input type="checkbox" id="hideMode">
    Hide completely
  </label>
  <div class="desc">No reveal button — text stays hidden</div>

  <div class="clicks-row">
    <label for="clicks">Clicks:</label>
    <input type="number" id="clicks" value="10" min="10">
  </div>
  <div class="clicks-hint">Increase for more clicks to read post text.</div>

  <script src="popup.js"></script>
</body>
</html>
